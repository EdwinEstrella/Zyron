<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hello World!</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            border: none;
        }

        body {
            overflow: hidden;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--background);
            color: var(--foreground);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }

        :root {
            --background: #1e1e1e;
            --foreground: #d4d4d4;
            --accent: #007acc;
        }

        .titlebar {
            -webkit-app-region: drag;
            height: 32px;
            background: var(--background);
            display: flex;
            align-items: center;
            padding: 0 12px 0 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .titlebar span {
            padding-left: 0;
        }

        .titlebar .window-controls {
            margin-left: auto;
            display: flex;
            margin-right: -12px;
        }

        .titlebar button {
            -webkit-app-region: no-drag;
            cursor: default;
            width: 46px;
            height: 32px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--foreground);
            transition: background 0.1s;
        }

        .titlebar button:hover {
            background: rgba(255,255,255,0.1);
        }

        .titlebar button.close:hover {
            background: #e81123;
            color: white;
        }

        .titlebar .window-controls {
            margin-left: auto;
            display: flex;
        }

        .window-controls span {
            width: 12px;
            height: 12px;
            display: inline-block;
        }

        .content {
            padding: 20px;
            cursor: default;
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <span>Hello World!</span>
        <div class="window-controls">
            <button id="min-btn" aria-label="Minimize">
                <svg width="12" height="12" viewBox="0 0 12 12">
                    <rect x="1" y="5" width="10" height="1" fill="currentColor"/>
                </svg>
            </button>
            <button id="max-btn" aria-label="Maximize">
                <svg id="max-icon" width="12" height="12" viewBox="0 0 12 12" style="display: block;">
                    <rect x="1" y="1" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1"/>
                </svg>
                <svg id="restore-icon" width="12" height="12" viewBox="0 0 12 12" style="display: none;">
                    <rect x="1" y="3" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/>
                    <polyline points="3 3 3 1 11 1 11 9" fill="none" stroke="currentColor" stroke-width="1"/>
                </svg>
            </button>
            <button id="close-btn" class="close" aria-label="Close">
                <svg width="12" height="12" viewBox="0 0 12 12">
                    <path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1"/>
                </svg>
            </button>
        </div>
    </div>
    <div class="content">
        <h1>Hello World!</h1>
        <p>
            We are using Node.js <span id="node-version"></span>,
            Chromium <span id="chrome-version"></span>,
            and Electron <span id="electron-version"></span>.
        </p>
        <script>
            // Update maximize/restore icon
            const updateMaximizeIcon = (isMaximized) => {
                const maxIcon = document.getElementById('max-icon')
                const restoreIcon = document.getElementById('restore-icon')
                const maxBtn = document.getElementById('max-btn')

                if (isMaximized) {
                    maxIcon.style.display = 'none'
                    restoreIcon.style.display = 'block'
                    maxBtn.setAttribute('aria-label', 'Restore')
                } else {
                    maxIcon.style.display = 'block'
                    restoreIcon.style.display = 'none'
                    maxBtn.setAttribute('aria-label', 'Maximize')
                }
            }

            // Listen for window state changes
            window.electronAPI.onWindowMaximized(updateMaximizeIcon)

            // Window controls
            document.getElementById('min-btn').addEventListener('click', () => {
                window.electronAPI.minimize()
            })

            document.getElementById('max-btn').addEventListener('click', () => {
                window.electronAPI.maximize()
            })

            document.getElementById('close-btn').addEventListener('click', () => {
                window.electronAPI.close()
            })
        </script>
    </div>
</body>
</html>
